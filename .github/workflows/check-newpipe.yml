name: Check NewPipeExtractor & Release

on:
  schedule:
    - cron: '0 6 * * *'   # diario 06:00 UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Forzar compilación y release aunque no haya cambios en NewPipeExtractor (sigue comprobando y actualiza si hay versión nueva)'
        type: boolean
        default: false
      skip_check:
        description: 'Compilar y publicar SIN comprobar NewPipeExtractor (usa la versión actual del repo)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comprobar última versión de NewPipeExtractor
        id: newpipe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(grep -E '^newpipe[[:space:]]*=[[:space:]]*"' gradle/libs.versions.toml | head -n1 | sed -E 's/.*"([^"]*)".*/\1/')

          # Opción manual 2: compilar SIN comprobar NewPipeExtractor
          if [ "${{ github.event.inputs.skip_check }}" == "true" ]; then
            echo "Build manual SIN comprobar NewPipeExtractor. Se usa la versión actual del repo ($CURRENT)."
            echo "latest=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            if [ -f version.json ]; then
              echo "first_run=false" >> "$GITHUB_OUTPUT"
            else
              echo "first_run=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          RESPONSE=$(curl -sf -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/TeamNewPipe/NewPipeExtractor/releases/latest)
          if [ -z "$RESPONSE" ]; then
            echo "Error: no se pudo consultar la API de GitHub" >&2
            exit 1
          fi
          LATEST=$(echo "$RESPONSE" | jq -r '.tag_name // empty')
          if [ -z "$LATEST" ]; then
            echo "Error: respuesta sin tag_name: $RESPONSE" >&2
            exit 1
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" == "$CURRENT" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -f version.json ]; then
            echo "first_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "first_run=true" >> "$GITHUB_OUTPUT"
          fi
          if [ "$LATEST" == "$CURRENT" ] && [ -f version.json ] && [ "${{ github.event.inputs.force_build }}" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Salir si no hay cambios
        if: steps.newpipe.outputs.should_build == 'false'
        run: echo "NewPipeExtractor sin cambios (${{ steps.newpipe.outputs.current }}) y version.json ya existe. Nada que hacer."

      # --- A partir de aquí solo se ejecuta si hay versión nueva, es la primera vez o build manual ---

      - name: Actualizar libs.versions.toml
        if: steps.newpipe.outputs.should_build == 'true' && steps.newpipe.outputs.changed == 'true'
        run: |
          sed -i "s/^newpipe = \"[^\"]*\"/newpipe = \"${{ steps.newpipe.outputs.latest }}\"/" gradle/libs.versions.toml

      - name: Subir versionCode y versionName
        if: steps.newpipe.outputs.should_build == 'true'
        id: bump
        run: |
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts)
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          NEW_NAME="${CURRENT_NAME%.*}.$NEW_CODE"
          sed -i "s/versionName = \"$CURRENT_NAME\"/versionName = \"$NEW_NAME\"/" app/build.gradle.kts

          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        if: steps.newpipe.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decodificar keystore
        if: steps.newpipe.outputs.should_build == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Dar permisos de ejecución a gradlew
        if: steps.newpipe.outputs.should_build == 'true'
        run: chmod +x gradlew

      - name: Compilar APK release firmado
        if: steps.newpipe.outputs.should_build == 'true'
        run: |
          for i in 1 2 3; do
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
              && break
            echo "Intento $i fallido, reintentando en 30s..."
            sleep 30
            if [ "$i" == "3" ]; then exit 1; fi
          done

      - name: Generar version.json
        if: steps.newpipe.outputs.should_build == 'true'
        run: |
          cat > version.json <<EOF
          {
            "versionCode": ${{ steps.bump.outputs.code }},
            "versionName": "${{ steps.bump.outputs.name }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.name }}/app-release.apk"
          }
          EOF

      - name: Commit cambios (versiones)
        if: steps.newpipe.outputs.should_build == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gradle/libs.versions.toml app/build.gradle.kts version.json
          git commit -m "chore: release v${{ steps.bump.outputs.name }} (NewPipeExtractor ${{ steps.newpipe.outputs.latest }})"
          git pull --rebase --autostash origin main
          git push

      - name: Crear Release con APK
        if: steps.newpipe.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.name }}
          name: v${{ steps.bump.outputs.name }}
          files: app/build/outputs/apk/release/app-release.apk
          body: "Release automática. NewPipeExtractor: ${{ steps.newpipe.outputs.latest }}"
